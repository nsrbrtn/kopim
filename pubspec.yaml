name: kopim
description: Современное финансовое приложение с поддержкой офлайн-режима и синхронизацией.
publish_to: 'none'
version: 1.0.2+4

environment:
  sdk: '>=3.9.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.0.0

  # State management
  riverpod: ^3.0.0

  # Immutable models
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0
  equatable: ^2.0.7
  collection: ^1.19.1

  # Database (Drift for offline-first)
  drift: ^2.33.0
  sqlite3_flutter_libs: ^0.6.0+eol
  path_provider: ^2.1.5
  path: ^1.9.0
  file_picker: ^12.0.0-beta.5

  # Firebase (auth, sync, analytics)
  firebase_core: ^4.1.1
  cloud_firestore: ^6.0.2
  firebase_auth: ^6.1.0
  firebase_analytics: ^12.0.2
  firebase_crashlytics: ^5.0.2
  firebase_storage: ^13.0.2
  firebase_remote_config: ^6.1.0
  firebase_messaging: ^16.0.3
  riverpod_annotation: ^4.0.2

  # Logging and monitoring
  sentry_flutter: ^9.6.0
  logger: ^2.6.1

  # Utils
  intl: ^0.20.2
  flutter_colorpicker: ^1.0.3
  meta: ^1.18.0
  crypto: ^3.0.3
  shared_preferences: ^2.3.2
  image_picker: ^1.2.0
  image: ^4.9.1
  flutter_markdown_plus: ^1.0.0+1
  animations: ^2.0.11
  # Analytics UI (charts) - merged, use syncfusion as advanced alternative
  syncfusion_flutter_charts: ^33.2.10  # Instead of fl_chart for richer features

  # Additional from user
  go_router: ^17.0.0
  connectivity_plus: ^7.0.0
  workmanager: ^0.9.0+3
  flutter_local_notifications: ^22.0.0
  uuid: ^4.5.1
  phosphor_flutter:
    path: third_party/phosphor_flutter
  rrule: ^0.2.17
  timezone: ^0.11.0
  flutter_timezone: ^5.0.1
  http: ^1.2.2
  url_launcher: ^6.3.2
  package_info_plus: ^10.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Build tools
  freezed: ^3.2.3
  build_runner: ^2.4.14
  build_web_compilers: ^4.3.2
  drift_dev: ^2.33.0
  riverpod_generator: ^4.0.3  # Added for Riverpod code-gen
  json_serializable: ^6.14.0

  # Testing
  mockito: ^5.6.4
  mocktail: ^1.0.4
  fake_cloud_firestore: ^4.0.0
  fake_async: ^1.3.3
  firebase_core_platform_interface: ^7.0.1

  # Lints
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/avatars/
    - assets/fonts/
    - assets/icons/
  # Добавьте assets, fonts если нужно для UI kit
  fonts:
    - family: Onest
      fonts:
        - asset: assets/fonts/Onest-Regular.ttf
          weight: 400
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
    # Phosphor icons (web) — явное включение шрифтов из пакета.
    - family: PhosphorBold
      fonts:
        - asset: packages/phosphor_flutter/fonts/Phosphor-Bold.ttf
          weight: 400
    - family: PhosphorDuotone
      fonts:
        - asset: packages/phosphor_flutter/fonts/Phosphor-Duotone.ttf
          weight: 400
    - family: PhosphorFill
      fonts:
        - asset: packages/phosphor_flutter/fonts/Phosphor-Fill.ttf
          weight: 400
    - family: PhosphorLight
      fonts:
        - asset: packages/phosphor_flutter/fonts/Phosphor-Light.ttf
          weight: 400
    - family: PhosphorThin
      fonts:
        - asset: packages/phosphor_flutter/fonts/Phosphor-Thin.ttf
          weight: 400
    - family: PhosphorRegular
      fonts:
        - asset: packages/phosphor_flutter/fonts/Phosphor.ttf
          weight: 400
